services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      # Optional: the deterministic engine runs without an OpenAI key.
      - path: ./backend/.env
        required: false
    volumes:
      - protonfix_data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  protonfix_data:
